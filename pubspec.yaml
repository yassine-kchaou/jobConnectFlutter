name: jobconnect
description: "JobConnect - Application mobile de mise en relation entre candidats et entreprises"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Core Dependencies
  dio: ^5.9.0
  get_it: ^9.2.0
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7
  dartz: ^0.10.1

  # url_lancher for opening links
  url_launcher: ^6.3.2

  # UI & Navigation
  flutter_svg: ^2.2.3
  google_fonts: ^6.3.3
  connectivity_plus: ^7.0.0

  # Storage
  shared_preferences: ^2.5.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Firebase (optional - disabled for Windows desktop)
  # firebase_core: ^4.3.0
  # firebase_auth: ^6.1.3
  # firebase_storage: ^13.0.5

  # Utils
  intl: ^0.20.2
  image_picker: ^1.2.1
  permission_handler: ^12.0.1
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  mockito: ^5.6.1
  build_runner: ^2.10.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/logo/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
